name: Deploy Riqa Dev
on:
  push:
    branches:
      - main
    paths:
      - apps/pdf-craft/**
  workflow_dispatch: {}

concurrency:
  group: deploy-pdf-craft-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ !contains(github.event.head_commit.message, '[skip-deploy]') }}
    permissions:
      contents: read
      id-token: write  # required for OIDC token exchange with GCP
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Pinned below 22.23.0: that Node security release broke node-fetch's
      # handling of keep-alive socket closures, which breaks firebase-tools'
      # Workload Identity Federation token exchange ("Failed to authenticate,
      # have you run firebase login?" / ERR_STREAM_PREMATURE_CLOSE) — see #201.
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.22.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build functions
        working-directory: apps/pdf-craft/functions
        run: pnpm run build

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools --ignore-scripts

      - name: Deploy Firestore rules and indexes
        working-directory: apps/pdf-craft
        run: firebase deploy --only firestore:rules,firestore:indexes --project pdf-craft-dev --force

      - name: Deploy Storage rules
        working-directory: apps/pdf-craft
        run: firebase deploy --only storage --project pdf-craft-dev --force

      - name: Deploy Cloud Functions
        working-directory: apps/pdf-craft
        run: firebase deploy --only functions --project pdf-craft-dev --force

      - name: Deploy App Hosting
        working-directory: apps/pdf-craft
        run: firebase deploy --only apphosting --project pdf-craft-dev --force
