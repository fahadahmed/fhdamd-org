name: Deploy PDF-Craft Staging

on:
  push:
    tags:
      - 'pdf-craft-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit belongs to main
        run: |
          git fetch origin main
          if ! git branch -r --contains "${{ github.sha }}" | grep -qE '\borigin/main\b'; then
            echo "::error::RC tags must be created from a commit on the main branch. Tag '${{ github.ref_name }}' points to ${{ github.sha }} which is not in main's history."
            exit 1
          fi
          echo "Commit ${{ github.sha }} is on main. Proceeding."

  sync-version:
    name: Sync package.json version with release tag
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Bump apps/pdf-craft/package.json to the canonical release version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#pdf-craft-v}"
          VERSION="${VERSION%-rc.*}"

          git fetch origin main
          git checkout -B main origin/main

          CURRENT=$(node -p "require('./apps/pdf-craft/package.json').version")
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "apps/pdf-craft/package.json already at $VERSION, nothing to do."
            exit 0
          fi

          (cd apps/pdf-craft && npm pkg set version="$VERSION")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/pdf-craft/package.json
          git commit -m "chore(pdf-craft): bump version to $VERSION [skip-deploy]"
          git push origin main

  deploy:
    name: Firebase deploy — staging
    needs: [guard, sync-version]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write  # required for OIDC token exchange with GCP
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build functions
        working-directory: apps/pdf-craft/functions
        run: pnpm run build

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools

      - name: Deploy Firestore rules
        working-directory: apps/pdf-craft
        run: ../../.github/scripts/firebase-deploy.sh --only firestore:rules --project pdf-craft-stg --force

      # firebase-tools' firestore:indexes deploy doesn't accept Workload Identity
      # Federation credentials ("Failed to authenticate, have you run firebase
      # login?") even though every other deploy target in this job does — see #201.
      # Call the Firestore Admin API directly with the WIF access token instead.
      - name: Deploy Firestore indexes
        working-directory: apps/pdf-craft
        run: |
          TOKEN=$(gcloud auth print-access-token)
          jq -c '.indexes[]' firestore.indexes.json | while read -r idx; do
            COLLECTION=$(echo "$idx" | jq -r '.collectionGroup')
            BODY=$(echo "$idx" | jq 'del(.collectionGroup)')
            STATUS=$(curl -s -o /tmp/index-resp.json -w "%{http_code}" -X POST \
              "https://firestore.googleapis.com/v1/projects/pdf-craft-stg/databases/(default)/collectionGroups/$COLLECTION/indexes" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$BODY")
            if [ "$STATUS" != "200" ] && ! grep -q ALREADY_EXISTS /tmp/index-resp.json; then
              echo "::error::Failed to deploy index on $COLLECTION (HTTP $STATUS)"
              cat /tmp/index-resp.json
              exit 1
            fi
          done

      - name: Deploy Storage rules
        working-directory: apps/pdf-craft
        run: ../../.github/scripts/firebase-deploy.sh --only storage --project pdf-craft-stg --force

      - name: Deploy Cloud Functions
        working-directory: apps/pdf-craft
        run: ../../.github/scripts/firebase-deploy.sh --only functions --project pdf-craft-stg --force

      - name: Deploy App Hosting
        working-directory: apps/pdf-craft
        run: ../../.github/scripts/firebase-deploy.sh --only apphosting --project pdf-craft-stg --force

  trigger-e2e:
    name: Trigger E2E tests
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch e2e-staging.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run e2e-staging.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"

  release:
    name: Publish GitHub Release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }} — staging" \
            --prerelease \
            --notes "Deployed to staging: https://stg.pdf-craft.app

          Commit: ${{ github.sha }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
