name: Deploy Riqa Staging

on:
  push:
    tags:
      - 'riqa-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit belongs to main
        run: |
          git fetch origin main
          if ! git branch -r --contains "${{ github.sha }}" | grep -qE '\borigin/main\b'; then
            echo "::error::RC tags must be created from a commit on the main branch. Tag '${{ github.ref_name }}' points to ${{ github.sha }} which is not in main's history."
            exit 1
          fi
          echo "Commit ${{ github.sha }} is on main. Proceeding."

  sync-version:
    name: Sync package.json version with release tag
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Bump apps/pdf-craft/package.json to the canonical release version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#riqa-v}"
          VERSION="${VERSION%-rc.*}"

          git fetch origin main
          git checkout -B main origin/main

          CURRENT=$(node -p "require('./apps/pdf-craft/package.json').version")
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "apps/pdf-craft/package.json already at $VERSION, nothing to do."
            exit 0
          fi

          (cd apps/pdf-craft && npm pkg set version="$VERSION")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/pdf-craft/package.json
          git commit -m "chore(pdf-craft): bump version to $VERSION [skip-deploy]"
          git push origin main

  deploy:
    name: Firebase deploy — staging
    needs: [guard, sync-version]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write  # required for OIDC token exchange with GCP
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      # Pinned below 22.23.0: that Node security release broke node-fetch's
      # handling of keep-alive socket closures, which breaks firebase-tools'
      # Workload Identity Federation token exchange ("Failed to authenticate,
      # have you run firebase login?" / ERR_STREAM_PREMATURE_CLOSE) — see #201.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.22.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build functions
        working-directory: apps/pdf-craft/functions
        run: pnpm run build

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools --ignore-scripts

      - name: Deploy Firestore rules and indexes
        working-directory: apps/pdf-craft
        run: firebase deploy --only firestore:rules,firestore:indexes --project pdf-craft-stg --force

      - name: Deploy Storage rules
        working-directory: apps/pdf-craft
        run: firebase deploy --only storage --project pdf-craft-stg --force

      - name: Deploy Cloud Functions
        working-directory: apps/pdf-craft
        run: firebase deploy --only functions --project pdf-craft-stg --force

      - name: Deploy App Hosting
        working-directory: apps/pdf-craft
        run: firebase deploy --only apphosting --project pdf-craft-stg --force

  trigger-e2e:
    name: Trigger E2E tests
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch e2e-staging.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run e2e-staging.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"

  release:
    name: Publish GitHub Release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }} — staging" \
            --prerelease \
            --notes "Deployed to staging: https://stg.riqa.app

          Commit: ${{ github.sha }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
