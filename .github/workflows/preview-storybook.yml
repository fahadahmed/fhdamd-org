name: Preview Storybook

on:
  pull_request:
    branches:
      - main
    paths:
      - packages/threads/**

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build and deploy Storybook (preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm --filter @fhdamd/threads build-storybook

      - name: Deploy to Firebase Hosting (preview channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THREADS }}
          projectId: fhdamd-threads
          expires: 7d
          entryPoint: packages/threads
